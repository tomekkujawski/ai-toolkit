name: Publish ai-toolkit

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  validate:
    name: Validate package contents
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Check required skill files exist
        run: |
          test -f skills/code-review-php-symfony/SKILL.md || (echo "Missing: skills/code-review-php-symfony/SKILL.md" && exit 1)
          test -f skills/architect-audit/SKILL.md || (echo "Missing: skills/architect-audit/SKILL.md" && exit 1)

      - name: Dry-run pack
        run: npm pack --dry-run

  publish:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
